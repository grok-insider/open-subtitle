# release-plz — automated versioning + releases for the open-subtitle workspace.
# Docs: https://release-plz.dev/docs/config
#
# Model: every crate shares ONE version via `version.workspace = true`
# (root Cargo.toml `[workspace.package] version`), so the binary crate `os-cli`
# is the single release unit. On each push to master, release-plz opens/updates a
# "release PR" that bumps that one version field (all crates follow), refreshes
# Cargo.lock, and regenerates the root CHANGELOG.md from Conventional Commits.
# Merging the release PR tags `vX.Y.Z` and creates the GitHub Release.
#
# Nothing is published to crates.io: delivery is the GitHub Release (prebuilt
# binaries for Linux/macOS/Windows + libopensubtitle + the mpv plugin) and the
# 0xfell cachix cache — `flake.nix` reads the same version from Cargo.toml.

[workspace]
# Not on crates.io: determine the current version from the `v*` git tag instead
# of the cargo registry, and never run `cargo publish`. (Set at BOTH the workspace
# and the os-cli package level — release-plz #2693: workspace-level values don't
# always propagate to packages, so the per-package settings below are the
# authoritative ones.)
git_only = true
publish = false
# Release only when the release PR is merged, not on every master commit.
release_always = false
# Internal libraries + two bins + one cdylib, not a published API surface: skip
# cargo-semver-checks (it only applies to crates.io libraries anyway).
semver_check = false
# Opt-in model: don't process any crate by default. `os-cli` opts in below; the
# other twelve crates ride the shared workspace version with no tag/release of
# their own — there is only one version field, so they all move in lockstep.
release = false
# Make the release PR easy to spot/filter.
pr_labels = ["release"]

[[package]]
name = "os-cli"
release = true
# Authoritative per-package settings (see the note in [workspace]): use git tags
# for version detection and never publish to crates.io.
git_only = true
publish = false
# One workspace-wide tag + release name, e.g. `v0.2.0` (the multi-crate default
# would be `os-cli-v0.2.0`).
git_tag_name = "v{{ version }}"
git_release_name = "v{{ version }}"
git_release_enable = true
git_tag_enable = true
# Keep the single curated changelog at the repo root.
changelog_path = "CHANGELOG.md"
# `os-cli` is the composition root that (transitively) depends on every other
# crate, so a change anywhere ships inside the release. Fold all members' commits
# into os-cli's version bump + changelog, so e.g. an `os-providers` fix still cuts
# a release and shows up in the notes.
changelog_include = [
    "os-core",
    "os-config",
    "os-identify",
    "os-providers",
    "os-process",
    "os-sync",
    "os-translate",
    "os-transcribe",
    "os-engine",
    "os-compose",
    "os-daemon",
    "os-ffi",
]

# Preserve the existing curated changelog header (release-plz would otherwise
# substitute its generic default). New version sections are inserted below this.
[changelog]
header = """# Changelog

All notable changes to this project are documented here. The format is based on
[Keep a Changelog](https://keepachangelog.com/en/1.1.0/), and this project adheres
to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).
"""
