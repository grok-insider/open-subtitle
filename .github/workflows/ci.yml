name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
  push:
    tags: ["v*"]
  workflow_dispatch:


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  # Fast Rust gate on every push/PR: fmt + clippy + the hermetic test suite.
  # No system deps: TLS is rustls + ring (no openssl/aws-lc), and the rest of the
  # workspace is pure-Rust (flate2/miniz, zip, encoding_rs, tiny_http).
  rust:
    name: fmt + clippy + test
    if: >
      github.event_name == 'workflow_dispatch'
      || github.event_name == 'push'
      || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      # Hermetic tests only; any live integration tests are #[ignore]d.
      - run: cargo test --workspace

  # On main/master pushes (plus tags + manual dispatch): build the package with
  # Nix and push every store path to the grok-insider cachix cache, so NixOS consumers
  # pointing at github:grok-insider/open-subtitle pull instead of compiling.
  # PRs never publish (no secrets on fork PRs).
  build:
    name: nix build + cachix push (x86_64-linux)
    if: >
      github.event_name == 'workflow_dispatch'
      || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
      || (github.event_name == 'pull_request'
          && github.event.action == 'closed'
          && github.event.pull_request.merged == true
          && github.event.pull_request.base.ref == 'master')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      # Configure the grok-insider cache as substituter AND push newly built paths to it
      # (CACHIX_AUTH_TOKEN secret). nix-community is pulled for build deps.
      - name: Set up Cachix
        uses: cachix/cachix-action@v15
        with:
          name: grok-insider
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          extraPullNames: nix-community

      - name: Build open-subtitle
        run: nix build .#open-subtitle -L

      - name: Flake check
        run: nix flake check -L
